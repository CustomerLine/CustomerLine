<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdiisPay — Fiches Clients v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--surface3:#21283a;
    --border:#30363d;--border2:#3d4756;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
    --accent:#2f81f7;--accent-glow:rgba(47,129,247,0.15);
    --green:#3fb950;--green-bg:rgba(63,185,80,0.1);
    --orange:#f0883e;--orange-bg:rgba(240,136,62,0.1);
    --red:#f85149;--red-bg:rgba(248,81,73,0.1);
    --purple:#a371f7;--purple-bg:rgba(163,113,247,0.1);
    --yellow:#e3b341;--yellow-bg:rgba(227,179,65,0.12);
    --teal:#39d353;--teal-bg:rgba(57,211,83,0.1);
    --r:10px;--r-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .header{background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;gap:24px;height:64px;position:sticky;top:0;z-index:100}
  .logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0}
  .logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px}
  .logo-sub{font-size:11px;color:var(--text3)}
  .hdiv{width:1px;height:28px;background:var(--border)}
  .search-wrap{flex:1;max-width:380px;position:relative}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
  #searchInput{width:100%;padding:8px 12px 8px 36px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
  #searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  #searchInput::placeholder{color:var(--text3)}
  .hstats{margin-left:auto;display:flex;gap:18px;align-items:center}
  .stat-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
  .stat-dot{width:8px;height:8px;border-radius:50%}
  .stat-num{font-family:'DM Mono',monospace;font-weight:500;color:var(--text)}

  .filter-bar{padding:10px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--surface)}
  .filter-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
  .filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
  .filter-btn:hover{border-color:var(--accent);color:var(--accent)}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:white}
  .filter-sep{width:1px;height:16px;background:var(--border);margin:0 4px}

  .layout{display:flex;height:calc(100vh - 115px)}

  .client-list{width:280px;min-width:280px;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
  .client-list::-webkit-scrollbar{width:4px}
  .client-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .client-count{padding:10px 16px 6px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
  .client-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
  .client-item:hover{background:var(--surface2)}
  .client-item.active{background:var(--surface3)}
  .client-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
  .avatar{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white}
  .cname{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cmeta{font-size:11px;margin-top:2px;display:flex;gap:4px;flex-wrap:wrap}
  .mtag{display:inline-flex;align-items:center;padding:1px 5px;border-radius:10px;font-size:10px;font-weight:500}
  .no-results{padding:24px 16px;text-align:center;color:var(--text3);font-size:12px}

  .detail-panel{flex:1;overflow-y:auto;padding:24px 32px}
  .detail-panel::-webkit-scrollbar{width:6px}
  .detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}

  .client-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .ch-avatar{width:52px;height:52px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:white}
  .ch-name{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
  .ch-tags{display:flex;flex-wrap:wrap;gap:5px}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid}
  .inclus-yes{color:var(--green);background:var(--green-bg);border-color:rgba(63,185,80,.25)}
  .inclus-no{color:var(--red);background:var(--red-bg);border-color:rgba(248,81,73,.25)}
  .migration-badge{color:var(--yellow);background:var(--yellow-bg);border-color:rgba(227,179,65,.25)}

  /* Source badge */
  .source-s1{color:var(--accent);background:var(--accent-glow);border-color:rgba(47,129,247,.25)}
  .source-s2{color:var(--teal);background:var(--teal-bg);border-color:rgba(57,211,83,.25)}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px}
  .kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;transition:border-color .2s}
  .kpi-card:hover{border-color:var(--border2)}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .kpi-value{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
  .kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}

  .section{margin-bottom:22px}
  .section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}

  /* PSP MATRIX — nouveau bloc visuel */
  .psp-matrix{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:4px}
  .psp-cell{border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;display:flex;flex-direction:column;gap:5px;transition:border-color .2s}
  .psp-cell:hover{border-color:var(--border2)}
  .psp-cell.active{border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.04)}
  .psp-cell.soon{border-color:rgba(227,179,65,.3);background:var(--yellow-bg)}
  .psp-cell.inactive{opacity:.4}
  .psp-name{font-size:12px;font-weight:600;color:var(--text)}
  .psp-icon{font-size:18px}
  .psp-status{font-size:10px;display:flex;align-items:center;gap:4px}
  .psp-dot{width:5px;height:5px;border-radius:50%}

  .payment-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px}
  .payment-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;transition:all .2s}
  .payment-card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .pay-icon{font-size:18px;margin-bottom:7px}
  .pay-name{font-size:13px;font-weight:600;margin-bottom:4px}
  .pay-st{font-size:11px;display:flex;align-items:center;gap:5px}
  .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .sage-pill{display:inline-flex;margin-top:6px;padding:2px 7px;border-radius:4px;background:var(--surface3);color:var(--text2);font-family:'DM Mono',monospace;font-size:10px;border:1px solid var(--border)}

  .billing-table{width:100%;border-collapse:collapse}
  .billing-table th{text-align:left;padding:8px 13px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border)}
  .billing-table td{padding:9px 13px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .billing-table tr:last-child td{border-bottom:none}
  .billing-table tr:hover td{background:var(--surface2)}
  .billing-table tbody{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);display:table-row-group}
  .amount-chip{display:inline-flex;align-items:center;gap:3px;background:var(--accent-glow);color:var(--accent);padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;border:1px solid rgba(47,129,247,.2)}
  .dash{color:var(--text3);font-family:'DM Mono',monospace;font-size:11px}

  /* Code base badge */
  .code-badge{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

  /* Migration banner */
  .migration-banner{background:var(--yellow-bg);border:1px solid rgba(227,179,65,.3);border-radius:var(--r);padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--yellow)}

  .fade-in{animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo-icon">E</div>
    <div>
      <div class="logo-text">EdiisPay</div>
      <div class="logo-sub">Fiches Clients — v2 enrichie</div>
    </div>
  </div>
  <div class="hdiv"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un client, un code base…">
  </div>
  <div class="hstats">
    <div class="stat-badge"><span class="stat-dot" style="background:var(--green)"></span><span class="stat-num" id="s-inclus">—</span>&nbsp;inclus</div>
    <div class="stat-badge"><span class="stat-dot" style="background:var(--accent)"></span><span class="stat-num" id="s-sepa">—</span>&nbsp;SEPA</div>
    <div class="stat-badge"><span class="stat-dot" style="background:var(--teal)"></span><span class="stat-num" id="s-new">—</span>&nbsp;nouveaux</div>
    <div class="stat-badge"><span class="stat-dot" style="background:var(--purple)"></span><span class="stat-num" id="s-total">—</span>&nbsp;clients</div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">Filtrer</span>
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn" data-filter="sepa">SEPA</button>
  <button class="filter-btn" data-filter="cb">CB / Carte</button>
  <button class="filter-btn" data-filter="stripe">Stripe</button>
  <button class="filter-btn" data-filter="paybox">Paybox</button>
  <button class="filter-btn" data-filter="payzen">Payzen</button>
  <button class="filter-btn" data-filter="esign">eSignature</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" data-filter="inclus">Coût inclus</button>
  <button class="filter-btn" data-filter="facture">Facturé</button>
  <button class="filter-btn" data-filter="migration">Migration</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" data-filter="s1">Facturation connue</button>
  <button class="filter-btn" data-filter="s2">Nouveaux éditeurs</button>
</div>

<div class="layout">
  <div class="client-list">
    <div class="client-count" id="clientCount">—</div>
    <div id="clientListContainer"></div>
    <div class="no-results" id="noResults" style="display:none">Aucun client trouvé</div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty-state">
      <div style="font-size:40px;opacity:.2">📋</div>
      <div style="font-size:14px;font-weight:600;color:var(--text2)">Sélectionnez un client</div>
      <div style="font-size:12px">Cliquez sur un client dans la liste pour voir sa fiche</div>
    </div>
  </div>
</div>

  if(f==='all')return true;
  if(f==='sepa')return hasPsp(d,'SEPA');
  if(f==='cb')return hasPsp(d,'CB')||hasPsp(d,'Carte bleue')||hasPsp(d,'CB en clair')||hasPsp(d,'PREL CB')||hasPsp(d,'CB-SEPA');
  if(f==='stripe')return hasPsp(d,'Stripe');
  if(f==='paybox')return hasPsp(d,'Paybox')||hasPsp(d,'PAYBOX');
  if(f==='payzen')return hasPsp(d,'Payzen');
  if(f==='esign')return hasEsign(d.rows);
  if(f==='inclus')return isInclus(d.rows);
  if(f==='facture')return d.rows.some(r=>r.inclus&&r.inclus.toLowerCase()==='non');
  if(f==='migration')return !!d.migration;
  if(f==='s1')return d.source==='S1'||d.source==='S1+S2';
  if(f==='s2')return d.source==='S2';
  return true;
}

function render(){
  const q=document.getElementById('q')||document.getElementById('searchInput');
  const qv=(q?q.value:'').toLowerCase();
  const container=document.getElementById('clientListContainer');
  container.innerHTML='';
  let vis=0;
  ALL.forEach(name=>{
    const d=DATA[name];
    const matchQ=name.toLowerCase().includes(qv)||(d.code_base&&d.code_base.toLowerCase().includes(qv));
    if(!matchQ||!matchFilter(d,currentFilter))return;
    vis++;
    const c=col(name),esign=hasEsign(d.rows),inclus=isInclus(d.rows),isNew=d.source==='S2',isMig=!!d.migration;
    const el=document.createElement('div');
    el.className='client-item'+(activeClient===name?' active':'');
    el.dataset.client=name;
    el.innerHTML=`<div class="avatar" style="background:${c}22;color:${c}">${ini(name)}</div>
    <div style="min-width:0;flex:1">
      <div class="cname">${name}</div>
      <div class="cmeta">
        ${d.code_base?`<span class="mtag" style="background:var(--surface2);color:var(--text3);border:1px solid var(--border)">${d.code_base}</span>`:''}
        ${esign?`<span class="mtag" style="background:var(--purple-bg);color:var(--purple)">eSign</span>`:''}
        ${isMig?`<span class="mtag" style="background:var(--yellow-bg);color:var(--yellow)">Migration</span>`:''}
        ${isNew?`<span class="mtag" style="background:rgba(57,211,83,.12);color:var(--teal)">Nouveau</span>`:inclus?`<span class="mtag" style="background:var(--green-bg);color:var(--green)">Inclus</span>`:`<span class="mtag" style="background:var(--red-bg);color:var(--red)">Facturé</span>`}
      </div>
    </div>`;
    el.addEventListener('click',()=>{activeClient=name;render();showDetail(name)});
    container.appendChild(el);
  });
  document.getElementById('clientCount').textContent=`${vis} client${vis>1?'s':''}`;
  document.getElementById('noResults').style.display=vis===0?'block':'none';
}

function showDetail(name){
  const d=DATA[name],rows=d.rows,c=col(name);
  const pay=getPayments(rows),esign=getEsign(rows),inclus=isInclus(rows);
  const hasEs=hasEsign(rows),hasS=hasPsp(d,'SEPA');
  const licence=esign.find(r=>r.forfait_mensuel)?.forfait_mensuel;
  const billingRows=rows.filter(r=>r.a_lacte||r.forfait_mensuel||r.forfait_hebdo);
  const panel=document.getElementById('detailPanel');

  // All PSPs from both sources
  const allPsps=new Set();
  Object.keys(d.psps_s2).forEach(p=>allPsps.add(p));
  pay.forEach(r=>allPsps.add(r.type_paiement));

  let html=`<div class="fade-in">`;

  // Migration banner
  if(d.migration){
    html+=`<div class="migration-banner">⚠️ <strong>Migration en cours</strong> — Ce client est en cours d'intégration dans EdiisPay</div>`;
  }

  // Header
  html+=`<div class="client-header">
    <div class="ch-avatar" style="background:${c}22;color:${c}">${ini(name)}</div>
    <div style="flex:1">
      <div class="ch-name" style="color:${c}">${name}</div>
      <div class="ch-tags">
        ${d.code_base?`<span class="tag" style="color:var(--text2);border-color:var(--border);background:var(--surface2);font-family:'DM Mono',monospace">${d.code_base}</span>`:''}
        ${hasEs?`<span class="tag" style="color:var(--purple);border-color:rgba(163,113,247,.3);background:var(--purple-bg)">✍ eSignature</span>`:''}
        ${hasS?`<span class="tag" style="color:var(--accent);border-color:rgba(47,129,247,.3);background:var(--accent-glow)">🏦 SEPA</span>`:''}
        ${d.source==='S2'?`<span class="tag" style="color:var(--teal);border-color:rgba(57,211,83,.3);background:rgba(57,211,83,.08)">Nouveau</span>`:d.source==='S1+S2'?`<span class="tag" style="color:var(--green);border-color:rgba(63,185,80,.3);background:var(--green-bg)">Enrichi</span>`:''}
        ${!d.migration&&rows.length>0?(inclus?`<span class="tag inclus-yes">✓ Coût inclus</span>`:`<span class="tag inclus-no">€ Facturé</span>`):''}
      </div>
    </div>
  </div>`;

  // KPIs
  html+=`<div class="kpi-row">
    <div class="kpi-card" style="border-top-color:${c}">
      <div class="kpi-label">PSP actifs</div>
      <div class="kpi-value" style="color:${c}">${allPsps.size||pay.length}</div>
      <div class="kpi-sub">${[...allPsps].join(' · ')||'—'}</div>
    </div>
    <div class="kpi-card" style="border-top-color:var(--purple)">
      <div class="kpi-label">eSignature</div>
      <div class="kpi-value" style="color:${hasEs?'var(--purple)':'var(--text3)'}">${hasEs?'Oui':'Non'}</div>
      <div class="kpi-sub">${hasEs?esign.length+' ligne(s)':'Non configuré'}</div>
    </div>
    <div class="kpi-card" style="border-top-color:${licence?'var(--accent)':'var(--border)'}">
      <div class="kpi-label">Licence mensuelle</div>
      <div class="kpi-value" style="color:${licence?'var(--accent)':'var(--text3)'}">${licence?parseFloat(licence).toFixed(2)+'\u202f€':'—'}</div>
      <div class="kpi-sub">${licence?'Forfait SEPA/mois':'N/A'}</div>
    </div>
    <div class="kpi-card" style="border-top-color:${inclus&&rows.length?'var(--green)':rows.length?'var(--red)':'var(--border)'}">
      <div class="kpi-label">Facturation</div>
      <div class="kpi-value" style="color:${inclus&&rows.length?'var(--green)':rows.length?'var(--red)':'var(--text3)'}">${rows.length?(inclus?'Incluse':'Séparée'):'—'}</div>
      <div class="kpi-sub">${rows.length?(inclus?'Dans coût de gestion':'Facturé au client'):'Données à compléter'}</div>
    </div>
  </div>`;

  // PSP Matrix (nouveauté)
  if(allPsps.size>0){
    html+=`<div class="section"><div class="section-title">Tableau PSP actifs</div><div class="psp-matrix">`;
    allPsps.forEach(psp=>{
      const s2stat=d.psps_s2[psp];
      const inRows=pay.some(r=>r.type_paiement===psp);
      const isActive=s2stat==='X'||inRows;
      const isSoon=s2stat==='à venir';
      const cls=isSoon?'soon':isActive?'active':'';
      const dotC=isSoon?'var(--yellow)':isActive?'var(--green)':'var(--text3)';
      const stTxt=isSoon?'À venir':isActive?'Actif':'—';
      const icon=PIX[psp]||'💰';
      html+=`<div class="psp-cell ${cls}">
        <div class="psp-icon">${icon}</div>
        <div class="psp-name">${psp}</div>
        <div class="psp-status"><span class="psp-dot" style="background:${dotC}"></span><span style="color:${dotC}">${stTxt}</span></div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Détail facturation
  if(billingRows.length){
    html+=`<div class="section"><div class="section-title">Détail facturation (tarifs)</div>
    <table class="billing-table"><thead><tr><th>Type</th><th>À l'acte</th><th>Forfait mensuel</th><th>Forfait hebdo</th><th>SAGE</th></tr></thead><tbody>`;
    billingRows.forEach(r=>{
      const chip=v=>v?`<span class="amount-chip">${v}</span>`:`<span class="dash">—</span>`;
      html+=`<tr><td style="font-weight:500">${r.type_paiement||'—'}</td><td>${chip(fmtAmt(r.a_lacte))}</td><td>${chip(fmtAmt(r.forfait_mensuel))}</td><td>${chip(fmtAmt(r.forfait_hebdo))}</td><td>${r.sage?`<span class="sage-pill">${r.sage}</span>`:'<span class="dash">—</span>'}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  } else if(!d.migration){
    html+=`<div class="section"><div class="section-title">Facturation</div>
    <div style="padding:18px;text-align:center;color:var(--text3);background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);font-size:12px">
      ${d.source==='S2'?'Données de facturation non encore renseignées — client issu du référentiel technique uniquement':'Coût inclus dans la facturation globale — aucun montant spécifique renseigné'}
    </div></div>`;
  }

  html+=`</div>`;
  panel.innerHTML=html;
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input',render);

render();
if(ALL.length){showDetail(ALL[0]);activeClient=ALL[0];render();}
</script>
</body>
</html>
